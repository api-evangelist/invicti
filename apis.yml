aid: invicti
name: Invicti
description: >-
  Invicti is an enterprise web application security solution providing automated
  vulnerability scanning, DAST, and API security testing. The Invicti platform
  includes API Discovery capabilities that help build a complete inventory of
  an organization's internal and external API assets.
